<h1>Bolo de Cenoura</h1>


<h2>Ingredientes</h2>

    <ul>
        <li>Farinha 1Kg</li>
        <li>Cacau em pó 100g</li>
        <li>1 Cenoura ralada</li>
    </ul>


<h2>Modo de Preparo</h2>
    <ol>
        <li>Pegar a farinha e colocar em um recipiente</li>
        <li>Misturar com o cacau em pó</li>
        <li>Misturar a cenoura ralada</li>
    </ol>
