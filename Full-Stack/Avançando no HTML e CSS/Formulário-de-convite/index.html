<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de convite</title>

    <link rel="stylesheet" href="styles/index.css">

    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Leckerli+One&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

</head>
<body>
        <div class="app">

            <aside>
                <div class="aside-container">
                    <header>
                        <img src="assets/Logo.svg" alt="Logo festivo">
                        <h1>Festivite</h1>
                        <p>Crie um convite digital para o seu evento</p>
                    </header>
                </div>
            </aside>


            <main>
                <div class="main-container"> 
                    <h1>Crie seu convite</h1>



                    <form enctype="multipart/form-data" method="post">
                        <fieldset class="about-event">

                            <div class="event-wrapper">
                                <img src="assets/icons/calendar.svg" alt="calendar">
                                <h2>Sobre o evento</h2>
                            </div>

                            <div>
                                <h3>Título</h3>
                                <input id="event-name" type="text" placeholder="Nome do evento">
                            </div>

                            <div class="date-wrapper">
                                <div>
                                    <h3>Início</h3>
                                    <input type="date" placeholder=", --:--">
                                </div>
                                
                                <div>
                                    <h3>Fim</h3>
                                    <input type="date" placeholder=", --:--">
                                </div>
                            </div>

                                <div class="tipo_local-wrapper">
                                   <div class="tipo-evento-wrapper">
                                    <h3>Tipo</h3>
                                    <div class="opcoes-grupo">
                                        <input type="radio" id="presencial" name="tipo" value="present">
                                        <label for="presencial" class="botao-opcao">
                                            <img src="assets/icons/building.svg" alt="Prédio"> 
                                            <span>Presencial</span>
                                        </label>

                                        
                                        <input type="radio" id="online" name="tipo" value="online">
                                        <label for="online" class="botao-opcao">
                                            <img src="assets/icons/video.svg" alt="Câmera">
                                            <span>Online</span>
                                        </label>
                                    </div>
                                </div>

                                    

                                    <div>

                                        <h3>Local</h3>
                                        <input type="text" placeholder="Link ou endereço">
                                    </div>

                                </div>

                            <div class="text-area-wrapper">
                                <h3>Descrição</h3>
                                <textarea name="decription" id="decription" cols="30" rows="5" placeholder="Escreva sobre os detalhes do evento"></textarea>
                            </div>
                        </fieldset>

                        <fieldset>
                            <div class="event-wrapper">
                                <img src="assets/icons/paintbrush-vertical.svg" alt="pincel">
                                <h2>Personalização</h2>
                            </div>    

                            <div class="main-color-wrapper">
                                
                                <h3>Cor principal</h3>
                                <div class="colors-wrapper">
                                    

                                </div>

                                <h3>Tema do evento</h3>
                                <div class="background-wrapper" >
                                    <figure>
                                        <img src="assets/background-partys/Image.png" alt="Aniversário">
                                        <h3>Aniversário</h3>
                                    </figure>

                                    <figure>
                                        <img src="assets/background-partys/Image.png" alt="Aniversário">
                                        <h3>Aniversário</h3>
                                    </figure>

                                    <figure>
                                        <img src="assets/background-partys/Image.png" alt="Aniversário">
                                        <h3>Aniversário</h3>
                                    </figure>

                                    <figure>
                                        <img src="assets/background-partys/Image.png" alt="Aniversário">
                                        <h3>Aniversário</h3>
                                    </figure>

                                    <figure>
                                        <img src="assets/background-partys/Image.png" alt="Aniversário">
                                        <h3>Aniversário</h3>
                                    </figure>

                                    <figure>
                                        <img src="assets/background-partys/Image.png" alt="Aniversário">
                                        <h3>Aniversário</h3>
                                    </figure>

                                    <figure>
                                        <img src="assets/background-partys/Image.png" alt="Aniversário">
                                        <h3>Aniversário</h3>
                                    </figure>

                                    <figure>
                                        <img src="assets/background-partys/Image.png" alt="Aniversário">
                                        <h3>Aniversário</h3>
                                    </figure>

                                    <figure>
                                        <img src="assets/background-partys/Image.png" alt="Aniversário">
                                        <h3>Aniversário</h3>
                                    </figure>

                                    <figure>
                                        <img src="assets/background-partys/Image.png" alt="Aniversário">
                                        <h3>Aniversário</h3>
                                    </figure>

                                    <figure>
                                        <img src="assets/background-partys/Image.png" alt="Aniversário">
                                        <h3>Aniversário</h3>
                                    </figure>

                                    <figure>
                                        <img src="assets/background-partys/Image.png" alt="Aniversário">
                                        <h3>Aniversário</h3>
                                    </figure>
                                </div>
                            </div>
                        </fieldset>

                    </form>
                </div>     
            </main>
        </div>
</body>
</html>
